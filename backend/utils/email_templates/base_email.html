<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Pañalera Online{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5EFE7; color: #111111; -webkit-font-smoothing: antialiased; }
    .wrapper { max-width: 580px; margin: 40px auto; background: #FFFFFF; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 40px rgba(0,0,0,0.08); }
    .header { background: #111111; padding: 28px 40px; text-align: center; }
    .header-logo { font-size: 22px; font-weight: 700; color: #FFFFFF; letter-spacing: -0.02em; }
    .header-logo span { color: #7BAFE0; }
    .body { padding: 40px; }
    .greeting { font-size: 24px; font-weight: 700; color: #111111; margin-bottom: 12px; letter-spacing: -0.02em; }
    .intro { font-size: 15px; color: #888884; line-height: 1.65; margin-bottom: 28px; }
    .divider { height: 1px; background: #EAEAEA; margin: 24px 0; }
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #888884; margin-bottom: 12px; }
    .items-table { width: 100%; border-collapse: collapse; }
    .items-table td { padding: 10px 0; vertical-align: top; }
    .item-name { font-size: 14px; font-weight: 600; color: #111111; }
    .item-size { font-size: 12px; color: #888884; margin-top: 2px; }
    .item-price { font-size: 14px; font-weight: 600; color: #111111; text-align: right; white-space: nowrap; }
    .total-row { display: flex; justify-content: space-between; padding: 12px 16px; background: #111111; border-radius: 10px; margin-top: 16px; }
    .total-label { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.7); }
    .total-value { font-size: 18px; font-weight: 700; color: #FFFFFF; }
    .info-card { background: #DCEEFF; border-radius: 12px; padding: 20px; margin: 20px 0; }
    .info-card-icon { font-size: 24px; margin-bottom: 8px; }
    .info-card-title { font-size: 15px; font-weight: 600; color: #111111; margin-bottom: 4px; }
    .info-card-text { font-size: 13px; color: #2E6EA6; line-height: 1.5; }
    .cta-btn { display: block; text-align: center; background: #111111; color: #FFFFFF; text-decoration: none; font-size: 14px; font-weight: 600; padding: 14px 28px; border-radius: 999px; margin: 24px auto 0; width: fit-content; }
    .footer { background: #F5EFE7; padding: 24px 40px; text-align: center; }
    .footer p { font-size: 12px; color: #888884; line-height: 1.6; }
    .footer a { color: #2E6EA6; text-decoration: none; }
    .status-pill { display: inline-block; padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .big-icon { font-size: 48px; text-align: center; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="header-logo">Pañalera<span>.</span></div>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>
        © 2025 Pañalera Online — Hecho con ❤️ en Argentina<br />
        <a href="{{ frontend_url }}">panalera.com</a> · 
        <a href="mailto:hola@panalera.com">hola@panalera.com</a>
      </p>
    </div>
  </div>
</body>
</html>
